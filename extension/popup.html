<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MangaDex Presence</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    .header {
      background: linear-gradient(135deg, #e8471c, #c53030);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 28px; height: 28px;
      background: white;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .header h1 { font-size: 14px; font-weight: 600; color: white; }
    .header p { font-size: 11px; color: rgba(255,255,255,0.75); }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      font-size: 12px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
    }
    .dot.connected { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
    .dot.disconnected { background: #f44336; box-shadow: 0 0 6px #f44336; }

    .card {
      margin: 12px;
      background: #16213e;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #0f3460;
    }

    .card-inner {
      display: flex;
      gap: 10px;
      padding: 12px;
    }

    .cover {
      width: 54px; height: 76px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: #0f3460;
    }

    .cover-placeholder {
      width: 54px; height: 76px;
      border-radius: 6px;
      background: #0f3460;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .info { display: flex; flex-direction: column; justify-content: center; gap: 4px; overflow: hidden; }
    .manga-title { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chapter { font-size: 11px; color: #e8471c; font-weight: 500; }
    .action { font-size: 11px; color: #aaa; }
    .elapsed { font-size: 10px; color: #666; margin-top: 4px; }

    .empty {
      padding: 24px 14px;
      text-align: center;
      color: #555;
      font-size: 12px;
    }
    .empty .icon { font-size: 28px; margin-bottom: 8px; }

    .footer {
      padding: 10px 14px;
      font-size: 10px;
      color: #444;
      text-align: center;
      border-top: 1px solid #0f3460;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">📖</div>
    <div>
      <h1>Hơi ấm cuối cùng</h1>
      <p>Discord Rich Presence for MangaDex</p>
    </div>
  </div>

  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="status-text">Checking desktop app...</span>
  </div>

  <div id="content">
    <div class="empty">
      <div class="icon">🔍</div>
      <div>Open a manga or chapter<br>on MangaDex to begin</div>
    </div>
  </div>

  <div class="footer">Created by @at_norky</div>

  <script src="popup.js"></script>
</body>
</html>
